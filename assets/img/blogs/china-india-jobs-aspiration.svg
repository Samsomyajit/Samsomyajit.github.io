<svg width="1400" height="850" viewBox="0 0 1400 850" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Aspirations and Employment Mismatch</title>
  <desc id="desc">Illustrative bars comparing job aspiration concentration versus broad employment ecosystems.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="850" fill="url(#bg)"/>

  <text x="700" y="80" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="700" text-anchor="middle">Aspiration Breadth vs Employment Breadth</text>

  <text x="360" y="150" fill="#f9fafb" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="600" text-anchor="middle">Narrow aspiration funnel</text>
  <text x="1030" y="150" fill="#f9fafb" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="600" text-anchor="middle">Broad productive base</text>

  <rect x="190" y="220" width="340" height="70" rx="8" fill="#f97316"/>
  <text x="360" y="265" fill="#1f2937" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle">High prestige jobs</text>

  <rect x="240" y="320" width="240" height="70" rx="8" fill="#fb923c"/>
  <text x="360" y="365" fill="#1f2937" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">Limited vacancies</text>

  <rect x="280" y="420" width="160" height="70" rx="8" fill="#fdba74"/>
  <text x="360" y="465" fill="#1f2937" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle">Crowded competition</text>

  <rect x="820" y="220" width="420" height="62" rx="8" fill="#22c55e"/>
  <text x="1030" y="260" fill="#052e16" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">Manufacturing and industrial services</text>

  <rect x="820" y="304" width="390" height="62" rx="8" fill="#4ade80"/>
  <text x="1015" y="344" fill="#052e16" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">Logistics, maintenance, trade networks</text>

  <rect x="820" y="388" width="360" height="62" rx="8" fill="#86efac"/>
  <text x="1000" y="428" fill="#052e16" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">Vocational and technical ladders</text>

  <rect x="820" y="472" width="330" height="62" rx="8" fill="#bbf7d0"/>
  <text x="985" y="512" fill="#052e16" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">Local entrepreneurship channels</text>

  <line x1="620" y1="200" x2="620" y2="600" stroke="#475569" stroke-width="2" stroke-dasharray="10 10"/>

  <text x="700" y="670" fill="#d1d5db" font-family="Inter, Arial, sans-serif" font-size="28" text-anchor="middle">The wider the respected job ecosystem, the lower the aspiration bottleneck.</text>
</svg>
