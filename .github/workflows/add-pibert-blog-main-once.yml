name: Add PIBERT blog to website data

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/add-pibert-blog-main-once.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Register the PIBERT blog post
        run: python scripts/add_pibert_blog_main_once.py
      - name: Commit the updated blog data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Register PIBERT blog post in website data
          branch: main
          file_pattern: js/data.js scripts/add_pibert_blog_main_once.py
