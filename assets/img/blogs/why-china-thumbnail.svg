<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Why I Chose China</title>
  <desc id="desc">A literary thumbnail for a personal essay about India, Ireland, China, identity, love, and scientific ambition.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset="0.45" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#fee2e2"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c0392b"/>
      <stop offset="1" stop-color="#7f1d1d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#7f1d1d" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1010" cy="80" r="220" fill="#fecaca" opacity="0.35"/>
  <circle cx="160" cy="540" r="260" fill="#fed7aa" opacity="0.32"/>
  <path d="M90 500 C280 320, 430 370, 595 250 S915 110, 1110 220" fill="none" stroke="#c0392b" stroke-width="4" stroke-linecap="round" opacity="0.22"/>
  <g filter="url(#shadow)">
    <rect x="90" y="85" width="1020" height="460" rx="34" fill="white" opacity="0.88"/>
  </g>
  <text x="135" y="160" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#c0392b" letter-spacing="3">ESSAY · IDENTITY · SCIENCE</text>
  <text x="135" y="275" font-family="Georgia, 'Times New Roman', serif" font-size="76" font-weight="700" fill="#1f2937">Why I Chose China</text>
  <text x="138" y="333" font-family="Georgia, 'Times New Roman', serif" font-size="32" fill="#475569">A personal journey from India and Ireland to Shanghai</text>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="23" font-weight="700">
    <rect x="138" y="392" width="150" height="48" rx="24" fill="#fff1f2" stroke="#fecdd3"/>
    <text x="177" y="424" fill="#9f1239">India</text>
    <path d="M305 416 H380" stroke="#c0392b" stroke-width="3" stroke-linecap="round"/>
    <path d="M372 406 L386 416 L372 426" fill="none" stroke="#c0392b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="405" y="392" width="152" height="48" rx="24" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="445" y="424" fill="#166534">Ireland</text>
    <path d="M575 416 H650" stroke="#c0392b" stroke-width="3" stroke-linecap="round"/>
    <path d="M642 406 L656 416 L642 426" fill="none" stroke="#c0392b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="675" y="392" width="145" height="48" rx="24" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="714" y="424" fill="#1d4ed8">China</text>
  </g>
  <text x="138" y="490" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" fill="#64748b">love · literature · research · belonging · Shanghai Jiao Tong University</text>
  <rect x="910" y="350" width="126" height="126" rx="28" fill="url(#accent)" opacity="0.95"/>
  <text x="952" y="426" font-family="Georgia, 'Times New Roman', serif" font-size="68" fill="white">中</text>
</svg>
