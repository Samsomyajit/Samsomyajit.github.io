<rect x="95" y="837" width="145" height="25" rx="5" fill="#dce9ff"/><text x="168" y="855" text-anchor="middle" class="small">Predict centers</text><text x="275" y="858" text-anchor="middle" class="body" font-weight="700">+</text><rect x="310" y="837" width="145" height="25" rx="5" fill="#eaf8ee"/><text x="383" y="855" text-anchor="middle" class="small">Predict answer span</text><text x="275" y="894" text-anchor="middle" class="small">Weak supervision is derived directly from data.</text>
<rect x="555" y="555" width="490" height="350" class="panel"/><rect x="555" y="555" width="490" height="52" class="cap"/><text x="800" y="589" text-anchor="middle" class="ph">5. Inference Behaviour</text>
<circle cx="610" cy="661" r="25" fill="#2b9e4b"/><text x="610" y="670" text-anchor="middle" class="small" font-size="17" font-weight="700" fill="white">A</text><text x="652" y="650" class="body" font-weight="700">Answer</text><text x="652" y="676" class="small">Clear, confident interpretation</text>
<rect x="825" y="628" width="190" height="58" rx="10" fill="#eef8f1" stroke="#2b9e4b"/><text x="920" y="651" text-anchor="middle" class="small">Q: Capital of France?</text><text x="920" y="674" text-anchor="middle" class="small" font-weight="700">A: Paris</text>
<circle cx="610" cy="746" r="25" fill="#e39a28"/><text x="610" y="756" text-anchor="middle" font-size="29" fill="white">?</text><text x="652" y="735" class="body" font-weight="700">Clarify</text><text x="652" y="761" class="small">Ask a follow-up question</text><rect x="825" y="713" width="190" height="68" rx="10" fill="#fff7e8" stroke="#e39a28"/><text x="920" y="738" text-anchor="middle" class="small">“Do you mean charge</text><text x="920" y="760" text-anchor="middle" class="small">a device, battery, or card?”</text>
<circle cx="610" cy="836" r="25" fill="#7444ad"/><text x="610" y="844" text-anchor="middle" class="small" font-size="13" font-weight="700" fill="white">ALT</text><text x="652" y="825" class="body" font-weight="700">Present alternatives</text><text x="652" y="851" class="small">Return multiple plausible answers</text><rect x="825" y="803" width="190" height="70" rx="10" fill="#f4effc" stroke="#7444ad"/><text x="920" y="827" text-anchor="middle" class="small">A1: device  A2: battery</text><text x="920" y="851" text-anchor="middle" class="small">A3: payment card</text><text x="800" y="894" text-anchor="middle" class="small">The predicted distribution determines response behaviour.</text>
<rect x="1080" y="555" width="490" height="350" class="panel"/><rect x="1080" y="555" width="490" height="52" class="cap"/><text x="1325" y="589" text-anchor="middle" class="ph">6. Results &amp; Contributions</text>
<text x="1125" y="672" class="t metric" fill="#1856b1">91.2%</text><text x="1128" y="699" class="small">Behaviour accuracy</text><text x="1125" y="770" class="t metric" fill="#238a49">93.0%</text><text x="1128" y="797" class="small">Center assignment accuracy</text><text x="1125" y="868" class="t metric" fill="#7444ad">8.8</text><text x="1128" y="895" class="small">Worst-cluster F1</text>
<line x1="1320" y1="632" x2="1320" y2="885" stroke="#c5d1e6" stroke-width="2"/><text x="1350" y="660" class="body" font-weight="700">Key takeaways</text><text x="1350" y="694" class="small" font-size="14">No manual interpretation labels</text><text x="1350" y="730" class="small" font-size="14">Ambiguity-aware</text><text x="1350" y="750" class="small" font-size="14">multilingual QA</text><text x="1350" y="790" class="small" font-size="14">Better response behaviour</text><text x="1350" y="830" class="small" font-size="14">Generalizes EN-ES to EN-DE</text><text x="1350" y="870" class="small" font-size="14">Joint center + span prediction</text>
