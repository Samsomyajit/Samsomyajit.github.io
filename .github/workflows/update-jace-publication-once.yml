name: Update JACerS publication

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/update-jace-publication-once.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Apply JACerS publication update
        run: python scripts/update_jace_publication_once.py
      - name: Commit publication and news update
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Publish JACerS article update
          branch: main
          file_pattern: index.html js/data.js js/latest-news.js js/app-core.js news/index.html publications.md react-app/src/data/publications.js sitemap.xml scripts/update_jace_publication_once.py
