<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
<title id="title">CenterDistill research overview at EANN 2026</title>
<desc id="desc">A six-panel technical illustration of CenterDistill covering ambiguous multilingual questions, embeddings, semantic centers, weakly supervised distillation, inference behaviour, and reported results.</desc>
<defs>
  <linearGradient id="header" x1="0" x2="1"><stop offset="0" stop-color="#123c8c"/><stop offset="1" stop-color="#0c62b7"/></linearGradient>
  <linearGradient id="footer" x1="0" x2="1"><stop offset="0" stop-color="#f4f7ff"/><stop offset="1" stop-color="#eef5ff"/></linearGradient>
  <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#0b2455" flood-opacity="0.12"/></filter>
  <style>
    .t{font-family:Arial,Helvetica,sans-serif;fill:#0b2455}
    .h1{font-size:64px;font-weight:800;letter-spacing:-1px}
    .sub{font-size:30px;font-weight:700}
    .ph{font-size:25px;font-weight:700;fill:white}
    .body{font-size:19px;fill:#17243d}
    .small{font-size:16px;fill:#33435f}
    .metric{font-size:42px;font-weight:800}
    .label{font-size:18px;font-weight:700}
    .panel{fill:white;stroke:#2b68c4;stroke-width:2.2;rx:16;filter:url(#shadow)}
    .cap{fill:url(#header);rx:14}
    .muted{fill:#f7f9fe;stroke:#c8d7f0;stroke-width:1.5}
  </style>
</defs>
