name: Fix PIBERT blog merge result

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/fix-pibert-blog-merge-once.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Apply merge cleanup
        run: python scripts/fix_pibert_blog_merge_once.py
      - name: Commit corrected blog source
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Preserve PIBERT blog title and root-relative image path
          branch: main
          file_pattern: blogs/pibert_fourier_wavelet_transformer_dialogue.md scripts/fix_pibert_blog_merge_once.py
