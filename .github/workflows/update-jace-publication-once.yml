name: Synchronize JACerS publication update

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/update-jace-publication-once.yml

permissions:
  contents: write

jobs:
  update-publication:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update publication and news records
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          import re

          TITLE = "Machine learning assisted inverse design of low resistivity In–Ga–Sn–Zn oxide sputtering targets"
          AUTHORS = "Cheng, N., Chakraborty, S., Liu, X., Zhang, W., Liang, X., Zhao, H., Bi, W., Zhang, M., Sun, B., He, J. and Liu, Y."

          def published_object(thumbnail: str) -> str:
              return f'''    {{
                id: 6,
                title: "{TITLE}",
                authors: "{AUTHORS}",
                year: 2026,
                journal: "Journal of the American Ceramic Society",
                articleId: "JACE71067",
                internalArticleId: "100636828",
                doi: "10.1111/jace.71067",
                url: "https://doi.org/10.1111/jace.71067",
                thumbnail: "{thumbnail}",
              }},'''.replace("              ", "")

          def synchronize_data_file(path: str, thumbnail: str) -> None:
              file_path = Path(path)
              text = file_path.read_text(encoding="utf-8")

              object_pattern = re.compile(
                  r'    \{\n(?:(?!    \},\n).)*?title: "' + re.escape(TITLE) +
                  r'",\n(?:(?!    \},\n).)*?    \},\n',
                  re.DOTALL,
              )
              text, removed = object_pattern.subn("", text)
              if removed == 0 and TITLE in text:
                  raise RuntimeError(f"Could not safely isolate existing record in {path}")

              marker = "  ],\n  underReview: ["
              if marker not in text:
                  raise RuntimeError(f"Could not locate journals/underReview boundary in {path}")

              journals, remainder = text.split(marker, 1)
              journals = journals.rstrip() + "\n" + published_object(thumbnail) + "\n"
              text = journals + marker + remainder
              file_path.write_text(text, encoding="utf-8")

          synchronize_data_file("js/data.js", "assets/FlowSputRes.png")
          synchronize_data_file("react-app/src/data/publications.js", "/assets/FlowSputRes.png")

          index_path = Path("index.html")
          index_text = index_path.read_text(encoding="utf-8")
          old_card = f'''            <div class="pub-compact-card animated-card">
              <span class="pub-compact-badge journal">Journal</span>
              <div class="pub-compact-content">
                <div class="pub-compact-title">{TITLE}</div>
                <div class="pub-compact-authors">{AUTHORS}</div>
                <div class="pub-compact-meta">
                  <span>Journal of the American Ceramic Society</span>
                  <span class="pub-compact-meta-sep">·</span>
                  <span>Article ID: JACE71067</span>
                  <span class="pub-compact-meta-sep">·</span>
                  <span>2026</span>
                  <span class="pub-compact-meta-sep">·</span>
                  <a href="https://doi.org/10.1111/jace.71067" target="_blank" rel="noopener">DOI</a>
                </div>
              </div>
            </div>'''
          new_card = f'''            <div class="pub-compact-card has-thumbnail animated-card">
              <span class="pub-compact-badge journal">Journal</span>
              <img class="pub-thumbnail" src="assets/FlowSputRes.png" alt="Inverse design of In–Ga–Sn–Zn oxide sputtering targets publication thumbnail">
              <div class="pub-compact-content">
                <div class="pub-compact-title">{TITLE}</div>
                <div class="pub-compact-authors">{AUTHORS}</div>
                <div class="pub-compact-meta">
                  <span>Journal of the American Ceramic Society</span>
                  <span class="pub-compact-meta-sep">·</span>
                  <span>Article ID: JACE71067</span>
                  <span class="pub-compact-meta-sep">·</span>
                  <span>Internal ID: 100636828</span>
                  <span class="pub-compact-meta-sep">·</span>
                  <span>2026</span>
                  <span class="pub-compact-meta-sep">·</span>
                  <a href="https://doi.org/10.1111/jace.71067" target="_blank" rel="noopener">DOI</a>
                </div>
              </div>
            </div>'''
          if old_card in index_text:
              index_text = index_text.replace(old_card, new_card, 1)
          elif new_card not in index_text:
              raise RuntimeError("Could not locate the JACerS publication card in index.html")
          index_path.write_text(index_text, encoding="utf-8")

          news_path = Path("js/latest-news.js")
          news_text = news_path.read_text(encoding="utf-8")
          news_text = news_text.replace("{ text: ' accepted/published in ' }", "{ text: ' published in ' }", 1)
          news_text = news_text.replace(
              "{ text: '. DOI: 10.1111/jace.71067.' }",
              "{ text: '. Article ID: JACE71067; DOI: 10.1111/jace.71067.' }",
              1,
          )
          news_text = news_text.replace(
              "{ text: ' 发表。DOI：10.1111/jace.71067。' }",
              "{ text: ' 发表。文章编号：JACE71067；DOI：10.1111/jace.71067。' }",
              1,
          )
          news_path.write_text(news_text, encoding="utf-8")

          publications_path = Path("publications.md")
          publications_text = publications_path.read_text(encoding="utf-8")
          publications_text = publications_text.replace(
              "Article ID: JACE71067. [doi: 10.1111/jace.71067]",
              "Article ID: JACE71067; Internal Article ID: 100636828. [doi: 10.1111/jace.71067]",
              1,
          )
          publications_path.write_text(publications_text, encoding="utf-8")

          # Validate that the record is no longer under review in either data source.
          for path in ("js/data.js", "react-app/src/data/publications.js"):
              text = Path(path).read_text(encoding="utf-8")
              under_review = text.split("underReview: [", 1)[1].split("  ],", 1)[0]
              journals = text.split("journals: [", 1)[1].split("  ],\n  underReview:", 1)[0]
              assert TITLE not in under_review, f"Stale under-review record remains in {path}"
              assert TITLE in journals, f"Published record missing from journals in {path}"
              assert "FlowSputRes.png" in journals, f"Thumbnail missing in {path}"

          assert "assets/FlowSputRes.png" in index_path.read_text(encoding="utf-8")
          assert "Internal ID: 100636828" in index_path.read_text(encoding="utf-8")
          PY

      - name: Commit synchronized website content
        shell: bash
        run: |
          rm -f .github/workflows/update-jace-publication-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html publications.md js/data.js js/latest-news.js react-app/src/data/publications.js .github/workflows/update-jace-publication-once.yml
          if git diff --cached --quiet; then
            echo "No changes required."
            exit 0
          fi
          git commit -m "Publish JACerS article and add thumbnail"
          git push origin HEAD:main
