name: Add Wikidata to homepage schema

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/add-wikidata-sameas-once.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Add Wikidata URL to static homepage JSON-LD
        run: python scripts/add_wikidata_sameas_once.py
      - name: Commit updated homepage schema
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Add Wikidata profile to homepage Person sameAs
          branch: main
          file_pattern: index.html scripts/add_wikidata_sameas_once.py
