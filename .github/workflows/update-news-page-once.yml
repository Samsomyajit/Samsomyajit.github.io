name: Update news page

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/update-news-page-once.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Fix news positions and sitemap
        run: python scripts/fix_news_positions_sitemap_once.py
      - name: Commit news cleanup
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Fix news schema positions and sitemap dates
          branch: main
          file_pattern: news/index.html sitemap.xml scripts/fix_news_positions_sitemap_once.py
